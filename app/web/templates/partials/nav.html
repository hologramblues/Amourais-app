<style>

  .s-header{position:sticky;top:0;z-index:1000;height:56px;background:rgba(10,10,10,0.85);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);border-bottom:1px solid #222;display:flex;align-items:center;padding:0 1.5rem;gap:2rem}
  .s-logo{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:1.15rem;color:#ece7df;text-decoration:none;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:.5rem;flex-shrink:0;white-space:nowrap}
  .s-logo-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#c8102e;color:#fff;font-size:.9rem;line-height:1}
