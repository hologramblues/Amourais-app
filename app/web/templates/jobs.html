{% extends "layout.html" %}

{% block content %}
<h1>Jobs</h1>

<div class="s-section">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Profil</th>
        <th>Status</th>
        <th>Trigger</th>
        <th>Trouve</th>
        <th>Nouveau</th>
        <th>Download</th>
        <th>Upload</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody hx-get="/api/jobs/list" hx-trigger="load, every 10s" hx-swap="innerHTML">
      <tr><td colspan="10" class="text-muted">Chargement...</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}
