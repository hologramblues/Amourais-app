<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMOURAIS{% if title %} — {{ title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='samourais.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>

  <header class="s-header">
    <a href="/" class="s-logo">
      <span class="s-logo-mark">&#x2694;</span>
      <span>Samourais</span>
    </a>
    <nav class="s-nav">
      <a href="/"{% if page == "dashboard" %} aria-current="page"{% endif %}>Dashboard</a>
      <a href="/profiles"{% if page == "profiles" %} aria-current="page"{% endif %}>Profiles</a>
      <a href="/jobs"{% if page == "jobs" %} aria-current="page"{% endif %}>Jobs</a>
      <a href="/viewer"{% if page == "viewer" %} aria-current="page"{% endif %}>Viewer</a>
      <a href="/editor"{% if page == "editor" %} aria-current="page"{% endif %}>Editor</a>
      <a href="/calendar"{% if page == "calendar" %} aria-current="page"{% endif %}>Calendrier</a>
      <a href="/analytics"{% if page == "analytics" %} aria-current="page"{% endif %}>Analytics</a>
      <a href="/settings"{% if page == "settings" %} aria-current="page"{% endif %}>Settings</a>
    </nav>
  </header>

  <main class="s-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="s-footer">
    SAMOURAIS SCRAPPER v2.0
  </footer>

</body>
</html>
